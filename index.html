<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneX Social | V6 Engine 👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600;700&display=swap');

        :root {
            --neon: #bc13fe;
            --dark: #020202;
            --admin-gold: #ffcc00;
            --danger: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* --- UI COMPONENTS --- */
        .page {
            display: none;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 85vh;
            padding-bottom: 100px;
        }

        .page.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .header-main {
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid var(--neon);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
        }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .btn-cyber:hover {
            background: var(--neon);
            color: #000;
        }

        /* --- CHAT & MESSAGES --- */
        .msg-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
        }

        .msg-author {
            color: var(--neon);
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* --- PROFILE VIEW --- */
        .pfp-big {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            margin: 0 auto 15px;
            overflow: hidden;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
            margin: 20px 0;
            border-top: 1px solid #222;
            padding-top: 10px;
        }

        /* --- NAV DOCK --- */
        .nav-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.9);
            padding: 10px 25px;
            border-radius: 40px;
            display: flex;
            gap: 20px;
            border: 1px solid #333;
            z-index: 1001;
        }

        .nav-link {
            color: #555;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .nav-link.active {
            color: var(--neon);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div id="landing-page"
        style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#000;">
        <h1 style="font-family:'Syncopate'; font-size:3rem; color:var(--neon);">DRONEX</h1>
        <button id="btn-enter" class="btn-cyber" style="margin-top:20px; font-size:1rem;">GOOGLE İLE GİRİŞ</button>
    </div>

    <div id="main-content" style="display:none;">
        <header class="header-main">
            <div style="font-family:'Orbitron'; color:var(--neon);">DRONEX SOCIAL</div>
            <div id="kurucu-badge"></div>
        </header>

        <div id="chat" class="page">
            <h2 style="color:var(--neon); margin-bottom:15px;">GLOBAL CHAT</h2>
            <div id="chat-window"
                style="height:55vh; overflow-y:auto; border:1px solid #222; padding:15px; border-radius:15px;"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <input id="chat-input" type="text" placeholder="Mesajını yaz..."
                    style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:12px; border-radius:8px;">
                <button onclick="sendMessage()" class="btn-cyber"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="user-view" class="page">
            <button onclick="tabTo('chat')" class="btn-cyber" style="margin-bottom:20px;"><i
                    class="fas fa-arrow-left"></i> GERİ</button>
            <div style="text-align:center; background:rgba(255,255,255,0.03); padding:30px; border-radius:20px;">
                <div class="pfp-big"><i class="fas fa-user-circle fa-5x" style="margin-top:20px;"></i></div>
                <h2 id="view-name">Kullanıcı Adı</h2>
                <div class="stats-grid">
                    <div><b id="view-followers">0</b><br><small>TAKİPÇİ</small></div>
                    <div><b id="view-following">0</b><br><small>TAKİP</small></div>
                </div>
                <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
                    <button id="follow-btn" class="btn-cyber" onclick="toggleFollow()">TAKİP ET</button>
                    <button class="btn-cyber" onclick="tabTo('messages')">MESAJ AT</button>
                    <button class="btn-cyber" style="border-color:var(--danger); color:var(--danger);"
                        onclick="blockUser()">ENGELLE</button>
                </div>
                <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
                <h4>VİDEOLAR</h4>
                <p style="color:#444; margin-top:10px;">Henüz video yüklenmedi.</p>
            </div>
        </div>

        <div id="profile" class="page">
            <div style="text-align:center;">
                <div class="pfp-big"><i class="fas fa-user-astronaut fa-5x"
                        style="margin-top:20px; color:var(--neon);"></i></div>
                <h2 id="my-name">Yükleniyor...</h2>
                <div class="stats-grid">
                    <div><b>128</b><br><small>TAKİPÇİ</small></div>
                    <div><b>64</b><br><small>TAKİP</small></div>
                </div>
                <button class="btn-cyber" onclick="tabTo('blocked-list')">ENGELLENENLER</button>
                <button class="btn-cyber" style="border-color:var(--danger); color:var(--danger); margin-top:10px;"
                    onclick="logout()">ÇIKIŞ YAP</button>
            </div>
        </div>

        <div id="blocked-list" class="page">
            <button onclick="tabTo('profile')" class="btn-cyber"><i class="fas fa-arrow-left"></i> GERİ</button>
            <h2 style="margin-top:20px;">Engellenen Kişiler</h2>
            <div id="blocked-users-container" style="margin-top:20px;">
                <p style="color:#333;">Henüz kimseyi engellemedin.</p>
            </div>
        </div>

        <div id="admin" class="page">
            <h2 style="color:var(--admin-gold); margin-bottom:20px;">🛡️ KURUCU KONTROLÜ</h2>
            <div
                style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; border:1px solid var(--admin-gold);">
                <h4>BAN SİSTEMİ</h4>
                <input id="ban-target" type="text" placeholder="Kullanıcı İsmi..."
                    style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff; border:1px solid #333;">
                <div style="display:flex; gap:10px;">
                    <button onclick="adminAction('ban')" class="btn-cyber"
                        style="flex:1; border-color:var(--danger); color:var(--danger);">ERİŞİMİ KES (BAN)</button>
                    <button onclick="adminAction('unban')" class="btn-cyber"
                        style="flex:1; border-color:var(--neon); color:var(--neon);">BAN KALDIR</button>
                </div>
            </div>
        </div>

        <nav class="nav-dock">
            <div class="nav-link active" onclick="tabTo('chat')"><i class="fas fa-globe"></i></div>
            <div class="nav-link" onclick="tabTo('profile')"><i class="fas fa-user"></i></div>
            <div id="admin-link" class="nav-link" style="display:none;" onclick="tabTo('admin')"><i
                    class="fas fa-crown"></i></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAutPInq2BBsOnKlZS2A6M9XTEq9MuhgRY",
            authDomain: "tanitimsitesi-1ca45.firebaseapp.com",
            projectId: "tanitimsitesi-1ca45",
            storageBucket: "tanitimsitesi-1ca45.firebasestorage.app",
            messagingSenderId: "43485443013",
            appId: "1:43485443013:web:4dd13cf9d8101c2fef51ac"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        const ADMIN_MAIL = "adilerkamtek2011@gmail.com";

        document.getElementById('btn-enter').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('my-name').innerText = user.displayName;
                if (user.email === ADMIN_MAIL) {
                    document.getElementById('admin-link').style.display = 'block';
                    document.getElementById('kurucu-badge').innerHTML = '<span style="color:var(--admin-gold); font-weight:bold; border:1px solid var(--admin-gold); padding:4px 10px; border-radius:5px; font-size:0.6rem;">KURUCU</span>';
                }
            } else {
                document.getElementById('landing-page').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
            }
        });

        // TAB SİSTEMİ
        window.tabTo = function (id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Nav link aktifliği (ID'ye göre)
        };

        // KULLANICI PROFİLİNE GİT
        window.openUserProfile = function (name) {
            document.getElementById('view-name').innerText = name;
            // Gerçek takipçi mantığı için burada Firestore'dan veri çekilmeli
            document.getElementById('view-followers').innerText = Math.floor(Math.random() * 500); // Test için
            tabTo('user-view');
        };

        // MESAJ GÖNDERME (LOKAL TEST)
        window.sendMessage = function () {
            const input = document.getElementById('chat-input');
            const win = document.getElementById('chat-window');
            if (input.value) {
                const msgId = "msg-" + Date.now();
                win.innerHTML += `
                    <div class="msg-container" id="${msgId}">
                        <span class="msg-author" onclick="openUserProfile('${currentUser.displayName}')">${currentUser.displayName}:</span>
                        <p>${input.value}</p>
                        <i class="fas fa-trash delete-btn" onclick="deleteMessage('${msgId}')"></i>
                    </div>
                `;
                input.value = "";
                win.scrollTop = win.scrollHeight;
            }
        };

        // MESAJ SİLME
        window.deleteMessage = function (id) {
            const msg = document.getElementById(id);
            if (confirm("Bu mesajı silmek istiyor musun?")) {
                msg.remove();
            }
        };

        // ENGELLEME SİSTEMİ
        window.blockUser = function () {
            const name = document.getElementById('view-name').innerText;
            if (confirm(`${name} isimli kullanıcıyı engellemek istediğine emin misin? \n\nOnaylarsan bu kişinin mesajlarını ve videolarını görmeyeceksin.`)) {
                alert(name + " engellendi.");
                tabTo('chat');
            }
        };

        // ADMIN İŞLEMLERİ
        window.adminAction = function (type) {
            const target = document.getElementById('ban-target').value;
            if (!target) return alert("Bir isim girin.");
            if (type === 'ban') {
                alert(target + " sistemden banlandı. Giriş yetkisi alındı.");
            } else {
                alert(target + " banı açıldı. Tekrar giriş yapabilir.");
            }
        };

        window.logout = () => signOut(auth);
        window.toggleFollow = () => {
            const btn = document.getElementById('follow-btn');
            if (btn.innerText === "TAKİP ET") {
                btn.innerText = "TAKİPTESİN";
                btn.style.background = "var(--neon)";
                btn.style.color = "#000";
            } else {
                btn.innerText = "TAKİP ET";
                btn.style.background = "transparent";
                btn.style.color = "var(--neon)";
            }
        };
    </script>
</body>

</html>
