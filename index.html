<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DroneX | Pro Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --insta-gradient: linear-gradient(45deg, #f093fb, #f5576c);
            --bg: #000;
            --card: #111;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            display: none !important;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            padding-bottom: 100px;
            box-sizing: border-box;
        }

        .active {
            display: flex !important;
        }

        /* ANONS */
        .announcement-bar {
            background: var(--insta-gradient);
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 2px solid gold;
            display: none;
            position: relative;
        }

        .announcement-bar i {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
        }

        /* CHAT */
        #chat-box,
        #private-chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg-bubble {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 12px;
            position: relative;
            border-left: 3px solid #f5576c;
        }

        .msg-user {
            font-weight: bold;
            cursor: pointer;
            color: #f5576c;
            margin-bottom: 5px;
        }

        .admin-name {
            color: var(--gold) !important;
            font-weight: 900 !important;
            text-shadow: 0 0 5px gold;
        }

        .admin-tools {
            position: absolute;
            right: 10px;
            top: 10px;
            display: none;
        }

        .is-admin .admin-tools {
            display: flex;
            gap: 10px;
        }

        /* PROFİL KARTI */
        .profile-header {
            text-align: center;
            padding: 30px 20px;
            background: #080808;
        }

        .stat-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-num {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .video-section {
            padding: 20px;
            border-top: 1px solid #222;
            text-align: center;
            color: #555;
        }

        /* BUTONLAR */
        .btn {
            width: 90%;
            max-width: 320px;
            padding: 12px;
            margin: 10px auto;
            border-radius: 10px;
            border: none;
            display: block;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-main {
            background: var(--insta-gradient);
            color: white;
        }

        .btn-outline {
            background: #222;
            color: white;
            border: 1px solid #444;
        }

        nav {
            height: 65px;
            border-top: 1px solid #222;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
        }

        nav i {
            font-size: 1.4rem;
            color: #555;
        }

        .active-nav {
            color: #f5576c;
        }
    </style>
</head>

<body id="main-body">

    <div id="announcement" class="announcement-bar">
        <span id="ann-text"></span>
        <i class="fas fa-times" id="close-ann" style="display:none;" onclick="deleteAnnouncement()"></i>
    </div>

    <div id="home-screen" class="screen active">
        <div
            style="background: var(--insta-gradient); padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px;">
            <h1 style="font-size: 3rem; margin: 0;">DroneX</h1>
            <p>HAT30 Yakında!</p>
        </div>
        <div id="admin-panel" style="display:none; padding: 20px;">
            <div style="background:#111; border: 1px solid gold; border-radius: 15px; padding: 15px;">
                <h3>🛡️ Admin Yönetimi</h3>
                <button class="btn btn-main" onclick="makeAnnouncement()">Büyük Anons Yap</button>
                <button class="btn btn-outline" style="color:red" onclick="deleteAnnouncement()">Anonsu Kaldır</button>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <h3 style="padding:15px; border-bottom:1px solid #222; margin:0;">Global Sohbet 🌍</h3>
        <div id="chat-box"></div>
        <div style="padding: 10px; display:flex;">
            <input type="text" id="chat-input" placeholder="Mesaj yaz..."
                style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px; border-radius:10px;">
            <button onclick="sendMsg()"
                style="background:none; border:none; color:#f5576c; font-size:1.5rem; padding:0 15px;"><i
                    class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="user-profile-screen" class="screen">
        <div class="profile-header">
            <div id="u-pic"
                style="width:100px; height:100px; border-radius:50%; background:#222; margin:0 auto; overflow:hidden; border:2px solid #f5576c;">
            </div>
            <h2 id="u-name">...</h2>
            <div class="stat-bar">
                <div class="stat-item">
                    <div class="stat-num" id="u-followers">0</div>
                    <div>Takipçi</div>
                </div>
            </div>
            <button class="btn btn-main" id="follow-btn" onclick="toggleFollow()">Takip Et</button>
            <button class="btn btn-outline" onclick="openPrivateChat()">Mesaj Gönder</button>
        </div>
        <div class="video-section"><i class="fas fa-video"></i><br>Video Yok</div>
    </div>

    <div id="private-chat-screen" class="screen">
        <h3 id="dm-title" style="padding:15px; border-bottom:1px solid #222; margin:0;">Özel Mesaj</h3>
        <div id="private-chat-box"></div>
        <div style="padding:10px; display:flex;">
            <input type="text" id="private-input" placeholder="Özel mesaj..."
                style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px; border-radius:10px;">
            <button onclick="sendPrivateMsg()"
                style="background:none; border:none; color:#f5576c; font-size:1.5rem; padding:0 15px;"><i
                    class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <nav id="main-nav" style="display:flex;">
        <i class="fas fa-home active-nav" onclick="nav('home-screen', this)"></i>
        <i class="fas fa-comment" onclick="nav('chat-screen', this)"></i>
        <i class="fas fa-user" onclick="nav('user-profile-screen', this)"></i>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, limit, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAutPInq2BBsOnKlZS2A6M9XTEq9MuhgRY", authDomain: "tanitimsitesi-1ca45.firebaseapp.com", projectId: "tanitimsitesi-1ca45", storageBucket: "tanitimsitesi-1ca45.firebasestorage.app", messagingSenderId: "43485443013", appId: "1:43485443013:web:4dd13cf9d8101c2fef51ac" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_GMAIL = "adilerkamtek2011@gmail.com";

        let selectedUserId = "";
        let currentUserData = { name: "Pilot" };

        onAuthStateChanged(auth, user => {
            if (user) {
                if (user.email === ADMIN_GMAIL) {
                    document.getElementById('main-body').classList.add('is-admin');
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('close-ann').style.display = 'block';
                }
                listenAnnouncements();
                listenChat();
                loadMyProfile();
            } else { location.href = "../"; }
        });

        // PROFİL GÖRÜNTÜLEME
        window.viewUser = async (uid) => {
            selectedUserId = uid;
            const s = await getDoc(doc(db, "users", uid));
            if (s.exists()) {
                const d = s.data();
                document.getElementById('u-name').innerText = d.name;
                document.getElementById('u-followers').innerText = (d.followers || []).length;
                document.getElementById('u-pic').innerHTML = d.pic ? `<img src="${d.pic}" style="width:100%">` : `<i class="fas fa-user" style="font-size:3rem; margin-top:20px;"></i>`;
                nav('user-profile-screen', document.querySelector('.fa-user'));
            }
        };

        // TAKİP ETME
        window.toggleFollow = async () => {
            const myId = auth.currentUser.uid;
            const userRef = doc(db, "users", selectedUserId);
            const s = await getDoc(userRef);
            const followers = s.data().followers || [];

            if (followers.includes(myId)) {
                await updateDoc(userRef, { followers: arrayRemove(myId) });
            } else {
                await updateDoc(userRef, { followers: arrayUnion(myId) });
            }
            viewUser(selectedUserId);
        };

        // ÖZEL MESAJ (DM)
        window.openPrivateChat = () => {
            const chatId = [auth.currentUser.uid, selectedUserId].sort().join("_");
            nav('private-chat-screen', document.querySelector('.fa-comment'));
            listenPrivateChat(chatId);
        };

        function listenPrivateChat(chatId) {
            onSnapshot(query(collection(db, "p_chats", chatId, "msgs"), orderBy("time", "asc")), (snap) => {
                const box = document.getElementById('private-chat-box');
                box.innerHTML = "";
                snap.forEach(d => { box.innerHTML += `<div class="msg-bubble"><b>${d.data().user}:</b> ${d.data().text}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendPrivateMsg = async () => {
            const val = document.getElementById('private-input').value;
            const chatId = [auth.currentUser.uid, selectedUserId].sort().join("_");
            if (!val) return;
            await addDoc(collection(db, "p_chats", chatId, "msgs"), { text: val, user: currentUserData.name, time: Date.now() });
            document.getElementById('private-input').value = "";
        };

        // ADMİN ANONS
        window.makeAnnouncement = async () => {
            const txt = prompt("Büyük Anons Metni:");
            if (txt) await setDoc(doc(db, "system", "announcement"), { text: txt, active: true });
        };
        window.deleteAnnouncement = async () => {
            await deleteDoc(doc(db, "system", "announcement"));
        };

        function listenAnnouncements() {
            onSnapshot(doc(db, "system", "announcement"), s => {
                const bar = document.getElementById('announcement');
                if (s.exists()) {
                    document.getElementById('ann-text').innerText = "📢 " + s.data().text;
                    bar.style.display = 'block';
                } else { bar.style.display = 'none'; }
            });
        }

        // GLOBAL CHAT LİSTENER
        function listenChat() {
            onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(50)), snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(d => {
                    const isAdmin = d.data().email === ADMIN_GMAIL;
                    box.innerHTML += `
                        <div class="msg-bubble">
                            <div class="msg-user ${isAdmin ? 'admin-name' : ''}" onclick="viewUser('${d.data().uid}')">${d.data().user} ${isAdmin ? '👑' : ''}</div>
                            <div>${d.data().text}</div>
                            <div class="admin-tools"><i class="fas fa-trash" onclick="deleteMsg('${d.id}')" style="color:red"></i></div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMsg = async () => {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            await addDoc(collection(db, "messages"), { text: input.value, user: currentUserData.name, email: auth.currentUser.email, uid: auth.currentUser.uid, time: Date.now() });
            input.value = "";
        };

        async function loadMyProfile() {
            const s = await getDoc(doc(db, "users", auth.currentUser.uid));
            if (s.exists()) currentUserData = s.data();
        }

        window.nav = (id, el) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active-nav'));
            if (el) el.classList.add('active-nav');
        };
        window.deleteMsg = async (id) => { if (confirm("Sil?")) await deleteDoc(doc(db, "messages", id)); };
    </script>
</body>

</html>
